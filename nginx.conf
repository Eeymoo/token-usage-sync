upstream token_usage_sync_upstream {
    server token-usage-sync:8787 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 20m;

    location = /healthz {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_intercept_errors on;
        error_page 502 503 504 = @new_api_fallback;
        proxy_pass http://token_usage_sync_upstream/healthz;
    }

    location /v1/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
        proxy_connect_timeout 2s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_intercept_errors on;
        error_page 502 503 504 = @new_api_fallback;
        proxy_pass http://token_usage_sync_upstream;
    }

    location /v1beta/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
        proxy_connect_timeout 2s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_intercept_errors on;
        error_page 502 503 504 = @new_api_fallback;
        proxy_pass http://token_usage_sync_upstream;
    }

    location @new_api_fallback {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host new-api.onemue.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
        proxy_ssl_name new-api.onemue.cn;
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
        proxy_connect_timeout 2s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_pass https://new-api.onemue.cn;
    }

    location / {
        return 404;
    }
}
